services:
  soc-dashboard:
    build: .
    container_name: sase-soc-dashboard
    restart: unless-stopped
    env_file: .env
    networks:
      - sase-internal
    ports:
      - "0.0.0.0:8090:8090"
    volumes:
      - ./data:/data
      - /home/saseadmin/netbird-deploy/caddy-root.crt:/certs/caddy-root.crt:ro
    extra_hosts:
      - "netbird.sandbox.local:192.168.122.23"

networks:
  sase-internal:
    external: true
