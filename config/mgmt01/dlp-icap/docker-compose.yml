services:
  dlp-icap:
    build: .
    container_name: dlp_icap
    ports:
      - 1345:1345
    networks:
      - sase-internal
    environment:
      - NATS_URL=nats://nats:4222
      - NATS_USER=mgmt01-pub
      - NATS_PASS=${NATS_MGMT01_PASS}
    restart: unless-stopped
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"
    healthcheck:
      test: ["CMD", "python3", "-c",
             "import socket; s=socket.socket(); s.connect(('127.0.0.1',1345)); s.close()"]
      interval: 30s
      timeout: 5s
      retries: 3
networks:
  sase-internal:
    external: true
