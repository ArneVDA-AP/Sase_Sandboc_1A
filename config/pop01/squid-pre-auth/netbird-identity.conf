# SASE PoC — Identity-based SWG access control (Identity Bridge, stap 7 part 1)
# Geplaatst in pre-auth/ zodat het vóór de http_access-keten laadt en de
# GUI-regeneratie van squid.conf overleeft.
#
# De external_acl roept de membership-oracle helper aan met %SRC (overlay-IP).
# De helper antwoordt OK/ERR op "zit dit IP in <groep>?". De multi-persona
# resolutie (most-restrictive) leeft in de http_access-volgorde, niet in de helper.

external_acl_type identitybridge ttl=30 negative_ttl=10 concurrency=0 %SRC /usr/local/bin/python3 /usr/local/etc/squid/identity_helper.py http://192.168.122.23:8088 /usr/local/etc/squid/identity_bridge.secret

# Persona-ACL: matcht wanneer de helper OK geeft voor de groep 'Studenten'.
acl persona_studenten external identitybridge Studenten

# Demo-policy: Studenten geen AI-chat. dstdomain matcht op de CONNECT-host/SNI
# (peek at step1), zodat de deny vuurt vóór de TLS-tunnel wordt opgezet.
acl ai_chat dstdomain .openai.com .chatgpt.com

# Domein-ACL eerst -> short-circuit: de (dure) external_acl-helper wordt alleen
# aangeroepen op AI-chat-verkeer, niet op elk request.
http_access deny ai_chat persona_studenten
